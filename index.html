<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUF193 Tesorería</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef0fb;--surface:#ffffff;--surface2:#f4f5fd;--border:#dde0f0;
  --accent:#6b8ef5;--accent2:#a07cf6;--green:#2eb870;--yellow:#e8a820;
  --orange:#e87840;--red:#e85560;--teal:#22b8a4;--pink:#e870a0;
  --text:#1e2547;--text2:#5a6285;--text3:#9da4c2;
  --radius:14px;--radius-sm:8px;
  --shadow:0 2px 12px #6b8ef518;--shadow-md:0 4px 24px #6b8ef524;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}

#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 70% 30%,#c8d8ff 0%,transparent 50%),radial-gradient(ellipse at 20% 80%,#dcc8ff 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,#e8f0ff 0%,#eef0fb 100%)}
.login-card{background:#fff;border:1px solid var(--border);border-radius:24px;padding:48px 40px;width:100%;max-width:400px;text-align:center;box-shadow:var(--shadow-md)}
.login-logo{font-size:38px;margin-bottom:8px}
.login-brand{font-size:22px;font-weight:900;letter-spacing:.04em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{color:var(--text2);font-size:13px;margin-bottom:28px}

#app{display:none}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:250px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;box-shadow:var(--shadow)}
.sidebar-logo{padding:20px;border-bottom:1px solid var(--border)}
.sidebar-brand{font-size:16px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-nav{flex:1;padding:10px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--accent)}
.nav-item.active{background:linear-gradient(135deg,#e8eeff,#f0e8ff);color:var(--accent);font-weight:600}

.main{margin-left:250px;min-height:100vh}
.topbar{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:62px;display:flex;align-items:center;z-index:50}
.content{padding:24px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}

.form-group{margin-bottom:14px; text-align: left;}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 13px;outline:none}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:var(--radius-sm);border:none;font-weight:600;cursor:pointer;transition: 0.2s;}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity: 0.9;}

.modal-overlay{position:fixed;inset:0;background:#1e254780;z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:400px;position: relative;}
.modal h3 {margin-bottom: 20px;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🏛️</div>
    <div class="login-brand">LUF193 TESORERÍA</div>
    <p class="login-sub">Ingresa tus credenciales</p>
    <div id="login-form-admin">
      <div class="form-group"><label>Usuario</label><input id="login-user" value="admin"></div>
      <div class="form-group"><label>Contraseña</label><input type="password" id="login-pass" value="1234"></div>
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Ingresar</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-brand">LUF193 TESORERÍA</div>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item active">📊 Dashboard</button>
      <button class="nav-item" onclick="openModal('modal-socio')">👥 Agregar Socio</button>
    </div>
  </div>
  <div class="main">
    <div class="topbar"><div class="page-title" style="font-weight: 700;">Panel de Control</div></div>
    <div class="content">
        <div class="card">
            <h3>Bienvenido</h3>
            <p style="color: var(--text2); margin-top: 10px;">Sistema conectado a la nube de Firebase.</p>
        </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-socio">
  <div class="modal">
    <h3>Nuevo Socio</h3>
    <div class="form-group"><label>Nombre</label><input id="s-nombre" placeholder="Nombre completo"></div>
    <div class="form-group"><label>Teléfono</label><input id="s-telefono" placeholder="099 000 000"></div>
    <button class="btn btn-primary" style="width: 100%; margin-bottom: 10px;" onclick="saveSocioCloud()">Guardar en la Nube</button>
    <button class="btn" style="width: 100%; background: #eee;" onclick="closeModal('modal-socio')">Cancelar</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDJG7C-fz81HWz0OmskEz0oiMVa-8TeEp8",
    authDomain: "luf193-tesoreria.firebaseapp.com",
    projectId: "luf193-tesoreria",
    storageBucket: "luf193-tesoreria.firebasestorage.app",
    messagingSenderId: "630854171052",
    appId: "1:630854171052:web:74f4e7a88b6a449cb82209",
    measurementId: "G-Z70MYHLP2Q"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // HACEMOS LAS FUNCIONES GLOBALES (Para que funcionen con los botones)
  
  window.doLogin = function() {
    const user = document.getElementById('login-user').value;
    const pass = document.getElementById('login-pass').value;
    
    if(user === "admin" && pass === "1234") {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
    } else {
        alert("Usuario o contraseña incorrectos");
    }
  };

  window.openModal = function(id) {
    document.getElementById(id).style.display = 'flex';
  };

  window.closeModal = function(id) {
    document.getElementById(id).style.display = 'none';
  };

  window.saveSocioCloud = async function() {
    const nombre = document.getElementById('s-nombre').value;
    const tel = document.getElementById('s-telefono').value;

    if(!nombre) return alert("Por favor ingresa un nombre");

    try {
      await addDoc(collection(db, "socios"), {
        nombre: nombre,
        telefono: tel,
        fechaRegistro: serverTimestamp()
      });
      alert("✅ ¡Socio guardado exitosamente!");
      window.closeModal('modal-socio');
      document.getElementById('s-nombre').value = "";
      document.getElementById('s-telefono').value = "";
    } catch (e) {
      alert("Error al guardar: " + e.message);
    }
  };

</script>
</body>
</html>
